<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UK Police Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header>
      <div class="flex items-center gap-3">
        <div class="logo">P</div>
        <div>
          <h1>UK Police Dashboard</h1>
          <p class="subtitle">data.police.uk • GitHub Pages</p>
        </div>
      </div>
      <button onclick="toggleDarkMode()" class="btn">🌓 Dark</button>
    </header>

    <!-- Setup Your Area -->
    <div class="setup-section">
      <h3>Setup Your Area</h3>
      <div class="setup-grid">
        <div>
          <label>Quick Locations</label>
          <div class="quick-buttons">
            <button onclick="quickLocation(51.5074, -0.1278)">London</button>
            <button onclick="quickLocation(53.4808, -2.2426)">Manchester</button>
            <button onclick="quickLocation(52.4862, -1.8904)">Birmingham</button>
            <button onclick="quickLocation(55.9533, -3.1883)">Edinburgh</button>
          </div>
        </div>

        <div>
          <label>Postcode</label>
          <div class="flex gap-2">
            <input id="postcode" type="text" placeholder="M1 1AA">
            <button onclick="searchPostcode()" class="btn">Go</button>
          </div>
        </div>

        <div>
          <label>Police Force</label>
          <select id="force-select" onchange="loadNeighbourhoods()">
            <option value="">Select Force</option>
          </select>
        </div>

        <div>
          <label>Neighbourhood</label>
          <select id="neighbourhood-select">
            <option value="">All areas</option>
          </select>
        </div>

        <div>
          <label>Month</label>
          <input id="date" type="month">
        </div>
      </div>

      <div class="flex gap-3 mt-4">
        <input id="lat" placeholder="Latitude" class="input">
        <input id="lng" placeholder="Longitude" class="input">
        <button onclick="loadAllData()" class="btn-primary">Load Data</button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div onclick="switchTab(0)" class="tab active" id="tab-0">Crime Map</div>
      <div onclick="switchTab(1)" class="tab" id="tab-1">Forces</div>
      <div onclick="switchTab(2)" class="tab" id="tab-2">Compare</div>
      <div onclick="switchTab(3)" class="tab" id="tab-3">Stop &amp; Search</div>
    </div>

    <!-- Crime Map Tab -->
    <div id="content-0" class="tab-content">
      <div class="kpi-grid" id="kpi-row"></div>

      <div class="card">
        <div class="flex justify-between items-center mb-3">
          <h3>Crime Map</h3>
          <div id="total-crimes" class="badge"></div>
        </div>
        <div id="map"></div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">
        <div class="card lg:col-span-3">
          <h3>Crime by Category</h3>
          <canvas id="category-chart"></canvas>
        </div>
        <div class="card lg:col-span-2">
          <h3>Top Streets</h3>
          <canvas id="streets-chart"></canvas>
        </div>
      </div>

      <div class="card p-0">
        <div class="table-header">
          <h3>Recent Crimes</h3>
          <button onclick="exportCSV()" class="btn text-sm">Export CSV</button>
        </div>
        <div class="table-container">
          <table>
            <thead><tr><th>Category</th><th>Street</th><th>Month</th></tr></thead>
            <tbody id="crime-table"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Other tabs (basic structure - will be enhanced) -->
    <div id="content-1" class="tab-content hidden">
      <div class="card">
        <h3>Forces</h3>
        <select id="force-details-select" onchange="loadForceDetails()"></select>
        <div id="force-info" class="mt-4"></div>
      </div>
    </div>

    <div id="content-2" class="tab-content hidden">
      <div class="card">
        <h3>Compare Forces</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <select id="compare1"></select>
          <select id="compare2"></select>
        </div>
        <button onclick="compareForces()" class="btn-primary mt-4">Compare</button>
        <div id="compare-results" class="mt-4"></div>
      </div>
    </div>

    <div id="content-3" class="tab-content hidden">
      <div class="card">
        <h3>Stop &amp; Search</h3>
        <button onclick="loadStopAndSearch()" class="btn-primary">Load for current location</button>
        <div id="sas-results" class="mt-4"></div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
</body>
</html>
