<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UK Police Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="flex items-center gap-3">
        <div class="logo">P</div>
        <div>
          <h1>UK Police Dashboard</h1>
          <p class="subtitle">data.police.uk • Live</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <div id="last-updated" class="last-updated"></div>
        <button onclick="toggleDarkMode()" class="btn">🌓</button>
      </div>
    </header>

    <div class="main-grid">
      <!-- Sidebar -->
      <div class="sidebar">
        <div class="card">
          <h3 class="section-title">LOCATION</h3>
          <div class="quick-buttons">
            <button onclick="quickLocation(51.5074, -0.1278)">London</button>
            <button onclick="quickLocation(53.4808, -2.2426)">Manchester</button>
            <button onclick="quickLocation(52.4862, -1.8904)">Birmingham</button>
            <button onclick="quickLocation(55.9533, -3.1883)">Edinburgh</button>
          </div>

          <div class="form-group">
            <label>Postcode</label>
            <div class="flex gap-2">
              <input id="postcode" type="text" placeholder="e.g. M1 1AA">
              <button onclick="searchPostcode()" class="btn">Go</button>
            </div>
          </div>

          <div class="grid-2">
            <div class="form-group">
              <label>Latitude</label>
              <input id="lat" value="51.5074">
            </div>
            <div class="form-group">
              <label>Longitude</label>
              <input id="lng" value="-0.1278">
            </div>
          </div>

          <button onclick="useMyLocation()" class="btn w-full">📍 Use my location</button>
        </div>

        <div class="card">
          <div class="form-group">
            <label>Crime Category</label>
            <select id="category">
              <option value="all-crime">All Crime</option>
              <option value="violent-crime">Violent crime</option>
              <option value="anti-social-behaviour">Anti-social behaviour</option>
              <option value="burglary">Burglary</option>
              <option value="vehicle-crime">Vehicle crime</option>
              <option value="shoplifting">Shoplifting</option>
            </select>
          </div>
          <div class="form-group">
            <label>Month</label>
            <input id="date" type="month" value="2025-03">
          </div>
          <button onclick="loadData()" class="btn-primary w-full">Load Data</button>
          <button onclick="loadComparison()" class="btn w-full mt-2">Compare previous month</button>
        </div>
      </div>

      <!-- Main Content -->
      <div class="content">
        <!-- KPIs -->
        <div id="kpi-row" class="kpi-grid"></div>

        <!-- Map -->
        <div class="card">
          <div class="flex justify-between items-center mb-3">
            <h3>Crime Map <span id="map-subtitle"></span></h3>
            <div id="total-crimes" class="badge"></div>
          </div>
          <div id="map"></div>
          <button onclick="toggleHeatmap()" class="btn text-xs mt-2">Toggle Heatmap</button>
        </div>

        <!-- Charts -->
        <div class="charts-grid">
          <div class="card">
            <h3>Crime by Category</h3>
            <canvas id="category-chart"></canvas>
          </div>
          <div class="card">
            <h3>Top Streets</h3>
            <canvas id="streets-chart"></canvas>
          </div>
        </div>

        <!-- Table -->
        <div class="card p-0">
          <div class="table-header">
            <h3>Crime List</h3>
            <div>
              <input id="table-search" type="text" placeholder="Search..." oninput="filterTable()">
              <button onclick="exportCSV()" class="btn text-sm">Export CSV</button>
            </div>
          </div>
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Category</th>
                  <th>Street</th>
                  <th>Month</th>
                </tr>
              </thead>
              <tbody id="crime-table"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
</body>
</html>
