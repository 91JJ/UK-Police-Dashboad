<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UK Police • Your Area</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header>
      <div class="flex items-center gap-3">
        <div class="logo">P</div>
        <div>
          <h1>UK Police</h1>
          <p class="subtitle">Find your local policing area</p>
        </div>
      </div>
    </header>

    <!-- Find Your Area (replicates police.uk flow) -->
    <div class="card">
      <h2>Find your local policing area</h2>
      <div class="area-selector">
        <!-- Quick select -->
        <div>
          <label>Quick select</label>
          <div class="quick-grid">
            <button onclick="selectArea(51.5074, -0.1278, 'Metropolitan Police')">London</button>
            <button onclick="selectArea(53.4808, -2.2426, 'Greater Manchester Police')">Manchester</button>
            <button onclick="selectArea(52.4862, -1.8904, 'West Midlands Police')">Birmingham</button>
            <button onclick="selectArea(55.9533, -3.1883, 'Police Scotland')">Edinburgh</button>
          </div>
        </div>

        <!-- Postcode -->
        <div>
          <label>Search by postcode</label>
          <div class="flex gap-2">
            <input id="postcode" type="text" placeholder="e.g. M1 1AA">
            <button onclick="searchByPostcode()" class="btn">Search</button>
          </div>
        </div>

        <!-- Force + Neighbourhood -->
        <div>
          <label>Police Force</label>
          <select id="force-select" onchange="loadNeighbourhoods()">
            <option value="">Select force...</option>
          </select>
        </div>
        <div>
          <label>Neighbourhood / Area</label>
          <select id="neighbourhood-select">
            <option value="">All areas</option>
          </select>
        </div>
      </div>

      <button onclick="loadAreaDashboard()" class="btn-primary mt-4 w-full">Show Area Dashboard</button>
    </div>

    <!-- Area Dashboard (appears after selection) -->
    <div id="dashboard" class="hidden">
      <div class="area-header">
        <div>
          <h2 id="area-name">Your Local Area</h2>
          <p id="area-force" class="text-slate-500"></p>
        </div>
        <div id="area-contact"></div>
      </div>

      <!-- Stats + Graphs -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="label">Total Crimes (last month)</div>
          <div id="total-crimes" class="big-number">—</div>
        </div>
        <div class="stat-card">
          <div class="label">Top Crime Type</div>
          <div id="top-crime" class="big-number">—</div>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="card">
          <h3>Crime by Category</h3>
          <canvas id="category-chart"></canvas>
        </div>
        <div class="card">
          <h3>Recent Crime Map</h3>
          <div id="map" style="height: 380px; border-radius: 12px;"></div>
        </div>
      </div>

      <!-- Extra sections -->
      <div class="card">
        <h3>Stop &amp; Search (last month)</h3>
        <div id="stop-search-summary"></div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
</body>
</html>
