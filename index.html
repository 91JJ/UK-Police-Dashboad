<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UK Police Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
</head>
<body>
  <div class="max-w-[1480px] mx-auto">
    <!-- Top Bar -->
    <div class="top-bar">
      <div class="flex items-center gap-3">
        <div class="logo">P</div>
        <div>
          <div class="text-2xl font-semibold tracking-tight">UK Police Dashboard</div>
          <div class="text-xs text-slate-500 -mt-1">data.police.uk • GitHub Pages</div>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <div id="last-updated" class="last-updated"></div>
        <button onclick="toggleDarkMode()" class="btn-secondary">🌓 Dark Mode</button>
      </div>
    </div>

    <div class="flex gap-6 p-8">
      <!-- Sidebar -->
      <div class="sidebar">
        <!-- Location section -->
        <div class="card">
          <div class="section-title">LOCATION</div>
          <div class="grid grid-cols-2 gap-2 mb-4">
            <button onclick="quickLocation(51.5074, -0.1278)" class="btn">London</button>
            <button onclick="quickLocation(53.4808, -2.2426)" class="btn">Manchester</button>
            <button onclick="quickLocation(52.4862, -1.8904)" class="btn">Birmingham</button>
            <button onclick="quickLocation(55.9533, -3.1883)" class="btn">Edinburgh</button>
          </div>

          <div class="mb-4">
            <div class="text-xs font-medium text-slate-500 mb-1.5">POSTCODE</div>
            <div class="flex gap-2">
              <input id="postcode" type="text" placeholder="SW1A 1AA" class="input">
              <button onclick="searchPostcode()" class="btn">Go</button>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3 mb-4">
            <div>
              <div class="text-xs font-medium text-slate-500 mb-1">LATITUDE</div>
              <input id="lat" type="text" value="51.5074" class="input">
            </div>
            <div>
              <div class="text-xs font-medium text-slate-500 mb-1">LONGITUDE</div>
              <input id="lng" type="text" value="-0.1278" class="input">
            </div>
          </div>

          <button onclick="useMyLocation()" class="btn w-full">📍 Use my location</button>
        </div>

        <!-- Filters -->
        <div class="card">
          <div class="mb-4">
            <div class="text-xs font-medium text-slate-500 mb-1.5">CRIME CATEGORY</div>
            <select id="category" class="input">
              <option value="all-crime">All Crime</option>
              <option value="anti-social-behaviour">Anti-social behaviour</option>
              <option value="burglary">Burglary</option>
              <option value="violent-crime">Violent crime</option>
              <option value="vehicle-crime">Vehicle crime</option>
              <option value="other-theft">Other theft</option>
              <option value="shoplifting">Shoplifting</option>
              <option value="criminal-damage-arson">Criminal damage</option>
              <option value="drugs">Drugs</option>
              <option value="public-order">Public order</option>
              <option value="robbery">Robbery</option>
            </select>
          </div>

          <div class="mb-4">
            <div class="text-xs font-medium text-slate-500 mb-1.5">MONTH</div>
            <input id="date" type="month" value="2025-03" class="input">
          </div>

          <button onclick="loadData()" class="btn-primary w-full mb-2">LOAD DATA</button>
          <button onclick="loadComparison()" class="btn w-full">Compare with previous month</button>
        </div>
      </div>

      <!-- Main Content -->
      <div class="flex-1 space-y-6">
        <!-- KPIs -->
        <div id="kpi-row" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>

        <!-- Map -->
        <div class="card">
          <div class="flex justify-between items-center mb-3 px-1">
            <div class="font-semibold">Crime Map <span id="map-subtitle"></span></div>
            <div class="flex gap-2">
              <div id="total-crimes" class="badge"></div>
              <button onclick="toggleHeatmap()" class="btn text-xs px-3 py-1">Toggle Heatmap</button>
            </div>
          </div>
          <div id="map" style="height: 520px; border-radius: 16px;"></div>
        </div>

        <!-- Charts -->
        <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">
          <div class="lg:col-span-3 card">
            <div class="font-semibold mb-4">Crime breakdown by category</div>
            <canvas id="category-chart"></canvas>
          </div>
          <div class="lg:col-span-2 card">
            <div class="font-semibold mb-4">Top streets by incidents</div>
            <canvas id="streets-chart"></canvas>
          </div>
        </div>

        <!-- Table -->
        <div class="card p-0 overflow-hidden">
          <div class="px-6 py-4 border-b flex justify-between items-center">
            <div class="font-semibold">Crime incidents</div>
            <div class="flex gap-3">
              <input id="table-search" type="text" placeholder="Search..." class="input w-64" oninput="filterTable()">
              <button onclick="exportCSV()" class="btn text-sm">Export CSV</button>
            </div>
          </div>
          <div class="overflow-auto max-h-[420px]">
            <table class="w-full">
              <thead>
                <tr>
                  <th>Category</th>
                  <th>Street</th>
                  <th>Month</th>
                </tr>
              </thead>
              <tbody id="crime-table"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
</body>
</html>
