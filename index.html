<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UK Police Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-100 dark:bg-slate-950 text-slate-900 dark:text-slate-100">
  <div class="max-w-screen-xl mx-auto">
    <!-- Header -->
    <div class="flex justify-between items-center px-6 py-5 border-b bg-white dark:bg-slate-900">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-bold text-2xl">P</div>
        <div>
          <div class="font-semibold text-2xl">UK Police Dashboard</div>
          <div class="text-xs text-slate-500">data.police.uk • GitHub Pages</div>
        </div>
      </div>
      <button onclick="toggleDarkMode()" class="px-4 py-2 text-sm border rounded-2xl">🌓 Dark</button>
    </div>

    <div class="p-6">
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- Sidebar -->
        <div class="lg:col-span-3 space-y-4">
          <div class="bg-white dark:bg-slate-900 rounded-3xl border p-5 space-y-4">
            <div class="font-semibold text-sm text-slate-500">LOCATION</div>
            <div class="grid grid-cols-2 gap-2">
              <button onclick="quickLocation(51.5074,-0.1278)" class="py-2 bg-slate-100 dark:bg-slate-800 rounded-2xl text-sm">London</button>
              <button onclick="quickLocation(53.4808,-2.2426)" class="py-2 bg-slate-100 dark:bg-slate-800 rounded-2xl text-sm">Manchester</button>
              <button onclick="quickLocation(52.4862,-1.8904)" class="py-2 bg-slate-100 dark:bg-slate-800 rounded-2xl text-sm">Birmingham</button>
              <button onclick="quickLocation(55.9533,-3.1883)" class="py-2 bg-slate-100 dark:bg-slate-800 rounded-2xl text-sm">Edinburgh</button>
            </div>

            <div>
              <div class="text-xs text-slate-500 mb-1">POSTCODE</div>
              <div class="flex gap-2">
                <input id="postcode" type="text" placeholder="M1 1AA" class="flex-1 px-3 py-2 border rounded-2xl text-sm dark:bg-slate-950">
                <button onclick="searchPostcode()" class="px-4 border rounded-2xl text-sm">Go</button>
              </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
              <input id="lat" value="51.5074" class="px-3 py-2 border rounded-2xl text-sm dark:bg-slate-950">
              <input id="lng" value="-0.1278" class="px-3 py-2 border rounded-2xl text-sm dark:bg-slate-950">
            </div>
            <button onclick="useMyLocation()" class="w-full py-2 text-sm border rounded-2xl">📍 Use my location</button>
          </div>

          <div class="bg-white dark:bg-slate-900 rounded-3xl border p-5 space-y-4">
            <div>
              <div class="text-xs text-slate-500 mb-1">CATEGORY</div>
              <select id="category" class="w-full px-3 py-2 border rounded-2xl text-sm dark:bg-slate-950">
                <option value="all-crime">All Crime</option>
                <option value="violent-crime">Violent crime</option>
                <option value="anti-social-behaviour">Anti-social behaviour</option>
                <option value="burglary">Burglary</option>
                <option value="vehicle-crime">Vehicle crime</option>
              </select>
            </div>
            <div>
              <div class="text-xs text-slate-500 mb-1">MONTH</div>
              <input id="date" type="month" value="2024-06" class="w-full px-3 py-2 border rounded-2xl text-sm dark:bg-slate-950">
            </div>
            <button onclick="loadData()" class="w-full py-3 bg-blue-600 text-white rounded-2xl font-semibold">LOAD DATA</button>
          </div>
        </div>

        <!-- Main Content -->
        <div class="lg:col-span-9 space-y-6">
          <div id="kpi-row" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>

          <div class="bg-white dark:bg-slate-900 rounded-3xl border p-4">
            <div class="flex justify-between mb-2">
              <div class="font-semibold">Crime Map <span id="map-subtitle"></span></div>
              <div id="total-crimes" class="text-sm px-3 py-1 bg-slate-100 dark:bg-slate-800 rounded-full"></div>
            </div>
            <div id="map" style="height: 420px;" class="rounded-2xl border"></div>
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">
            <div class="lg:col-span-3 bg-white dark:bg-slate-900 rounded-3xl border p-5">
              <div class="font-semibold mb-3">Crime by Category</div>
              <canvas id="category-chart"></canvas>
            </div>
            <div class="lg:col-span-2 bg-white dark:bg-slate-900 rounded-3xl border p-5">
              <div class="font-semibold mb-3">Top Streets</div>
              <canvas id="streets-chart"></canvas>
            </div>
          </div>

          <div class="bg-white dark:bg-slate-900 rounded-3xl border overflow-hidden">
            <div class="px-5 py-4 flex justify-between border-b">
              <div class="font-semibold">Crime List</div>
              <button onclick="exportCSV()" class="text-sm px-4 py-1 border rounded-2xl">Export CSV</button>
            </div>
            <div class="overflow-auto max-h-[380px]">
              <table class="w-full text-sm">
                <thead class="bg-slate-50 dark:bg-slate-800">
                  <tr><th class="px-5 py-3">Category</th><th class="px-5 py-3">Street</th><th class="px-5 py-3">Month</th></tr>
                </thead>
                <tbody id="crime-table"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let map, markerCluster, currentCrimes = [];
    let categoryChartInstance = null;
    let streetsChartInstance = null;

    function initMap() {
      map = L.map('map').setView([51.5074, -0.1278], 13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
      markerCluster = L.markerClusterGroup();
      map.addLayer(markerCluster);
    }

    function updateMap(crimes) {
      markerCluster.clearLayers();
      if (!crimes?.length) return;
      const bounds = L.latLngBounds();
      crimes.forEach(c => {
        if (!c.location?.latitude) return;
        const lat = parseFloat(c.location.latitude);
        const lng = parseFloat(c.location.longitude);
        const m = L.marker([lat, lng]);
        m.bindPopup(`<b>${c.category}</b><br>${c.location.street?.name || ''}`);
        markerCluster.addLayer(m);
        bounds.extend([lat, lng]);
      });
      if (bounds.isValid()) map.fitBounds(bounds, { padding: [20, 20] });
    }

    function updateKPIs(crimes) {
      const el = document.getElementById('kpi-row');
      if (!crimes?.length) return;
      const total = crimes.length;
      const counts = {};
      crimes.forEach(c => counts[c.category] = (counts[c.category] || 0) + 1);
      const top = Object.keys(counts).sort((a,b) => counts[b] - counts[a])[0];
      el.innerHTML = `
        <div class="bg-white dark:bg-slate-900 border rounded-3xl p-4">
          <div class="text-xs text-slate-500">TOTAL</div>
          <div class="text-3xl font-semibold">${total}</div>
        </div>
        <div class="bg-white dark:bg-slate-900 border rounded-3xl p-4">
          <div class="text-xs text-slate-500">TOP TYPE</div>
          <div class="text-xl font-semibold">${top}</div>
        </div>
      `;
    }

    function updateCharts(crimes) {
      const counts = {};
      crimes.forEach(c => counts[c.category] = (counts[c.category] || 0) + 1);

      // Destroy old charts before creating new ones
      if (categoryChartInstance) categoryChartInstance.destroy();
      if (streetsChartInstance) streetsChartInstance.destroy();

      categoryChartInstance = new Chart(document.getElementById('category-chart'), {
        type: 'doughnut',
        data: { labels: Object.keys(counts), datasets: [{ data: Object.values(counts) }] },
        options: { responsive: true, cutout: '65%' }
      });

      // Top streets chart
      const streetCounts = {};
      crimes.forEach(c => {
        const street = c.location?.street?.name || 'Unknown';
        streetCounts[street] = (streetCounts[street] || 0) + 1;
      });
      const topStreets = Object.entries(streetCounts).sort((a, b) => b[1] - a[1]).slice(0, 8);

      streetsChartInstance = new Chart(document.getElementById('streets-chart'), {
        type: 'bar',
        data: {
          labels: topStreets.map(x => x[0]),
          datasets: [{ data: topStreets.map(x => x[1]), backgroundColor: '#3b82f6' }]
        },
        options: { indexAxis: 'y', responsive: true, plugins: { legend: { display: false } } }
      });
    }

    function updateTable(crimes) {
      const tbody = document.getElementById('crime-table');
      tbody.innerHTML = '';
      currentCrimes = crimes;
      crimes.slice(0, 80).forEach(c => {
        const row = document.createElement('tr');
        row.innerHTML = `<td class="px-5 py-3">${c.category}</td><td class="px-5 py-3">${c.location?.street?.name || '—'}</td><td class="px-5 py-3">${c.month}</td>`;
        tbody.appendChild(row);
      });
    }

    async function loadData() {
      const lat = document.getElementById('lat').value;
      const lng = document.getElementById('lng').value;
      const cat = document.getElementById('category').value;
      const date = document.getElementById('date').value;

      document.getElementById('total-crimes').textContent = 'Loading...';

      let url = `https://data.police.uk/api/crimes-street/${cat}?lat=${lat}&lng=${lng}`;
      if (date) url += `&date=${date}`;

      console.log('Request URL:', url);

      try {
        const res = await fetch(url);
        const crimes = await res.json();

        if (!Array.isArray(crimes) || crimes.length === 0) {
          document.getElementById('total-crimes').textContent = 'No data';
          alert('No crimes found for this selection. Try month 2024-06 or 2024-01.');
          return;
        }

        document.getElementById('map-subtitle').textContent = date ? `• ${date}` : '';
        updateMap(crimes);
        updateKPIs(crimes);
        updateCharts(crimes);
        updateTable(crimes);
        document.getElementById('total-crimes').textContent = `${crimes.length} crimes`;
      } catch (e) {
        document.getElementById('total-crimes').textContent = 'Error';
        alert('Failed to load data.');
        console.error(e);
      }
    }

    function quickLocation(lat, lng) {
      document.getElementById('lat').value = lat;
      document.getElementById('lng').value = lng;
      loadData();
    }

    async function searchPostcode() {
      const pc = document.getElementById('postcode').value.trim().toUpperCase().replace(/\s/g, '');
      if (!pc) return;
      const res = await fetch(`https://api.postcodes.io/postcodes/${pc}`);
      const json = await res.json();
      if (json.status === 200) {
        document.getElementById('lat').value = json.result.latitude;
        document.getElementById('lng').value = json.result.longitude;
        loadData();
      }
    }

    function useMyLocation() {
      navigator.geolocation.getCurrentPosition(p => {
        document.getElementById('lat').value = p.coords.latitude.toFixed(5);
        document.getElementById('lng').value = p.coords.longitude.toFixed(5);
        loadData();
      });
    }

    function toggleDarkMode() {
      document.documentElement.classList.toggle('dark');
    }

    function exportCSV() {
      if (!currentCrimes.length) return;
      let csv = 'category,street,month\n';
      currentCrimes.forEach(c => csv += `${c.category},"${c.location?.street?.name || ''}",${c.month}\n`);
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
      a.download = 'police-data.csv';
      a.click();
    }

    async function init() {
      initMap();
      try {
        const r = await fetch('https://data.police.uk/api/crime-last-updated');
        const d = await r.json();
        if (d.date) document.getElementById('last-updated').innerHTML = `Data as of <span class="font-medium">${d.date}</span>`;
      } catch (_) {}
      setTimeout(loadData, 400);
    }

    window.onload = init;
  </script>
</body>
</html>
