<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UK Police Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="flex items-center gap-3">
        <div class="logo">P</div>
        <div>
          <h1>UK Police Dashboard</h1>
          <p class="subtitle">data.police.uk • Live</p>
        </div>
      </div>
      <button onclick="toggleDarkMode()" class="btn">🌓 Dark</button>
    </header>

    <!-- Setup Your Area -->
    <div class="setup-card">
      <h3 class="section-title">SETUP YOUR AREA</h3>
      <div class="setup-grid">
        <!-- Postcode -->
        <div>
          <label>Postcode</label>
          <div class="flex gap-2">
            <input id="postcode" type="text" placeholder="e.g. M1 1AA">
            <button onclick="searchPostcode()" class="btn">Go</button>
          </div>
        </div>

        <!-- Force -->
        <div>
          <label>Police Force</label>
          <select id="force-select" onchange="loadNeighbourhoods()">
            <option value="">Select Force...</option>
          </select>
        </div>

        <!-- Neighbourhood -->
        <div>
          <label>Neighbourhood / Area</label>
          <select id="neighbourhood-select">
            <option value="">All areas</option>
          </select>
        </div>
      </div>
      <button onclick="loadAllData()" class="btn-primary w-full mt-4">Load Data for My Area</button>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- KPIs -->
      <div id="kpi-row" class="kpi-grid"></div>

      <!-- Map -->
      <div class="card">
        <div class="flex justify-between items-center mb-3">
          <h3>Crime Map</h3>
          <div class="flex gap-2">
            <div id="total-crimes" class="badge"></div>
            <button onclick="toggleHeatmap()" class="btn text-xs">Toggle Heatmap</button>
          </div>
        </div>
        <div id="map"></div>
      </div>

      <!-- Charts Row -->
      <div class="charts-grid">
        <div class="card">
          <h3>Crime by Category</h3>
          <canvas id="category-chart"></canvas>
        </div>
        <div class="card">
          <h3>Top Streets</h3>
          <canvas id="streets-chart"></canvas>
        </div>
      </div>

      <!-- Crime Table -->
      <div class="card p-0">
        <div class="table-header">
          <h3>Recent Crimes</h3>
          <button onclick="exportCSV()" class="btn text-sm">Export CSV</button>
        </div>
        <div class="table-container">
          <table>
            <thead>
              <tr><th>Category</th><th>Street</th><th>Month</th></tr>
            </thead>
            <tbody id="crime-table"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
</body>
</html>
